server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tace_ecommerce?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1

# Spring AI 配置（阿里百炼 / DashScope，API 地址不变）
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${AI_API_KEY:your-api-key-here}   # 新平台百炼申请: https://bailian.console.aliyun.com
      chat:
        options:
          model: qwen3.5-plus

# JWT 配置
ecommerce:
  jwt:
    secret-key: ThisIsA32BytesLongSecretKeyForHS256
    ttl: 1800000  # 30分钟

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: com.ecommerce.entity
